name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  all:
    name: All checks
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: sqlode_integration
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5


    steps:
      - uses: actions/checkout@v6

      - uses: erlef/setup-beam@v1
        with:
          otp-version: "27"
          gleam-version: "1.15"

      - name: Install rebar3
        run: |
          wget -q https://s3.amazonaws.com/rebar3/rebar3 -O /usr/local/bin/rebar3
          chmod +x /usr/local/bin/rebar3

      - name: Install ShellSpec
        run: |
          curl -fsSL https://git.io/shellspec | sh -s -- --yes
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Download dependencies
        run: gleam deps download

      - name: Format check
        run: gleam format --check src/ test/

      - name: Type check
        run: gleam check

      - name: Build (warnings as errors)
        run: gleam build --warnings-as-errors

      - name: Lint (glinter, warnings as errors)
        run: gleam run -m glinter

      - name: Unit tests
        run: gleam test

      - name: ShellSpec tests
        run: shellspec

      - name: PostgreSQL integration test
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/sqlode_integration
        run: sh integration_test/run.sh case_postgresql_real

      # Use the MySQL that ships with the GitHub-hosted ubuntu runner
      # rather than a docker service container — the same approach
      # shork itself uses in its CI. The runner-bundled root account
      # uses `mysql_native_password`, which avoids the
      # caching_sha2_password handshake friction that mysql_otp 1.9
      # (the Erlang library underneath shork) hits with a fresh
      # mysql:8.0 container.
      - name: Set up MySQL
        run: |
          sudo /etc/init.d/mysql start
          mysql -e 'CREATE DATABASE sqlode_integration;' -uroot -proot

      - name: MySQL integration test
        env:
          MYSQL_URL: mysql://root:root@localhost:3306/sqlode_integration
        run: sh integration_test/run.sh case_mysql_real

  build-javascript:
    name: Build (JavaScript)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: erlef/setup-beam@v1
        with:
          otp-version: "27"
          gleam-version: "1.15"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: gleam deps download
      - run: gleam build --target javascript
